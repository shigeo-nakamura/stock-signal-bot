name: Deploy Stock Signal Bot

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "deploy/**"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: stock-signal-bot-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  INSTALL_DIR: /opt/stock-signal-bot

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python -m pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: stock-signal-bot
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET || vars.S3_BUCKET }}
        run: |
          aws s3 sync src/ "s3://${S3_BUCKET}/stock-signal-bot/src/" --delete
          aws s3 sync config/ "s3://${S3_BUCKET}/stock-signal-bot/config/" --delete
          aws s3 cp requirements.txt "s3://${S3_BUCKET}/stock-signal-bot/requirements.txt"
          aws s3 cp deploy/stock-signal-bot.service "s3://${S3_BUCKET}/deploy/stock-signal-bot.service"

      - name: Deploy via SSM
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET || vars.S3_BUCKET }}
          INSTANCE_ID: ${{ secrets.INSTANCE_ID || vars.INSTANCE_ID }}
        run: |
          cat > /tmp/ssm-params.json <<'JSON'
          {
            "commands": [
              "sudo mkdir -p __INSTALL_DIR__/src __INSTALL_DIR__/config __INSTALL_DIR__/state __INSTALL_DIR__/logs",
              "aws s3 sync s3://__S3_BUCKET__/stock-signal-bot/src/ __INSTALL_DIR__/src/",
              "aws s3 sync s3://__S3_BUCKET__/stock-signal-bot/config/ __INSTALL_DIR__/config/",
              "aws s3 cp s3://__S3_BUCKET__/stock-signal-bot/requirements.txt __INSTALL_DIR__/requirements.txt",
              "if [ ! -d __INSTALL_DIR__/venv ]; then python3 -m venv __INSTALL_DIR__/venv; fi",
              "__INSTALL_DIR__/venv/bin/pip install -q -r __INSTALL_DIR__/requirements.txt",
              "aws s3 cp s3://__S3_BUCKET__/deploy/stock-signal-bot.service /tmp/stock-signal-bot.service",
              "if [ ! -f /etc/systemd/system/stock-signal-bot.service ] || ! cmp -s /etc/systemd/system/stock-signal-bot.service /tmp/stock-signal-bot.service; then sudo mv /tmp/stock-signal-bot.service /etc/systemd/system/stock-signal-bot.service && sudo systemctl daemon-reload; else rm /tmp/stock-signal-bot.service; fi",
              "sudo systemctl enable stock-signal-bot",
              "sudo systemctl restart stock-signal-bot"
            ]
          }
          JSON
          sed -i "s|__INSTALL_DIR__|${INSTALL_DIR}|g; s|__S3_BUCKET__|${S3_BUCKET}|g" /tmp/ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy stock-signal-bot" \
            --parameters file:///tmp/ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          set +e
          aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}"
          WAIT_STATUS=$?
          aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}" --output text
          exit $WAIT_STATUS
